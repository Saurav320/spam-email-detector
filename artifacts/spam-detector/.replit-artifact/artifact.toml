kind = "web"
previewPath = "/"
title = "Spam Email Detector"
version = "1.0.0"
id = "artifacts/spam-detector"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23248

[services.development]
run = "pnpm --filter @workspace/spam-detector run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/spam-detector", "run", "build" ]
publicDir = "artifacts/spam-detector/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23248"
BASE_PATH = "/"

[[services]]
name = "flask-api"
paths = [ "/ml-api" ]
localPort = 5000

[services.development]
run = "cd /home/runner/workspace/backend && python train_model.py && python app.py"

[services.env]
PORT = "5000"
